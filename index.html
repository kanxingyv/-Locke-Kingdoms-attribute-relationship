<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>洛克王国属性克制</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #f0f4e8 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            padding: 10px;
        }

        .circle-container {
            position: relative;
            width: 100%;
            max-width: 90vw;
            aspect-ratio: 1;
            margin-bottom: 25px;
            margin-top: 10px;
        }

        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            z-index: 10;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 8px;
        }

        .center-type-name {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            text-shadow: 0 1px 3px rgba(255, 255, 255, 0.8);
            z-index: 15;
        }

        .icon-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            transform-origin: center center;
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .icon-wrapper.selected {
            transform: scale(1.3);
            z-index: 20;
            filter: brightness(1.2);
        }

        .icon {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.15));
            transition: transform 0.3s ease, filter 0.3s ease;
            cursor: pointer;
        }

        .icon:hover {
            transform: scale(1.2);
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.25));
        }

        .info-panel {
            width: 100%;
            max-width: 90vw;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 20px;
            display: none;
        }

        .info-panel.active {
            display: block;
        }

        .info-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .info-icon {
            width: 50px;
            height: 50px;
            object-fit: contain;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.2));
        }

        .info-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #333;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .info-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-icon {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .type-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .type-item {
            display: flex;
            align-items: center;
            gap: 5px;
            background: white;
            padding: 5px 10px;
            border-radius: 20px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .type-item-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        .type-item.enemy {
            background: linear-gradient(135deg, #ffe0e0 0%, #ffc0c0 100%);
            border: 1px solid #ff8080;
        }

        .section-1 .section-icon { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%); }
        .section-2 .section-icon { background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%); }
        .section-3 .section-icon { background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%); }
        .section-4 .section-icon { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }

        .enemy-mark {
            position: absolute;
            top: -3px;
            right: -3px;
            width: 10px;
            height: 10px;
            background: red;
            border-radius: 50%;
            border: 2px solid white;
            display: none;
        }

        .type-item-wrapper {
            position: relative;
        }

        @media (max-width: 400px) {
            .circle-container {
                max-width: 95vw;
            }

            .icon-wrapper {
                width: 45px;
                height: 45px;
            }

            .center-circle {
                width: 100px;
                height: 100px;
            }

            .info-panel {
                padding: 15px;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (min-width: 768px) {
            .circle-container {
                max-width: 85vw;
            }
        }
    </style>
</head>
<body>
    <div class="circle-container" id="circleContainer">
        <div class="center-circle"></div>
    </div>

    <div class="info-panel" id="infoPanel">
        <div class="info-grid">
            <div class="info-section section-1">
                <div class="section-title">
                    <div class="section-icon"></div>
                    我克制
                </div>
                <div class="type-list" id="list1"></div>
            </div>
            <div class="info-section section-2">
                <div class="section-title">
                    <div class="section-icon"></div>
                    我抵抗
                </div>
                <div class="type-list" id="list2"></div>
            </div>
            <div class="info-section section-3">
                <div class="section-title">
                    <div class="section-icon"></div>
                    克制我
                </div>
                <div class="type-list" id="list3"></div>
            </div>
            <div class="info-section section-4">
                <div class="section-title">
                    <div class="section-icon"></div>
                    抵抗我
                </div>
                <div class="type-list" id="list4"></div>
            </div>
        </div>
    </div>

    <script>
        const TYPE_DATA = {
            "草": { 
                "克制": ["水","地"], 
                "抵抗": ["火","机械","毒","翼","虫","龙"] 
            },
            "水": { 
                "克制": ["火","地","机械"], 
                "抵抗": ["冰","草","龙"] 
            },
            "火": { 
                "克制": ["草","冰","机械"], 
                "抵抗": ["地","龙","水"] 
            },
            "冰": { 
                "克制": ["草","地","龙","翼"], 
                "抵抗": ["火","冰","机械"] 
            },
            "机械": { 
                "克制": ["冰","萌","地"], 
                "抵抗": ["电","水","火","机械"] 
            },
            "普": { 
                "克制": [], 
                "抵抗": ["机械","地","幽灵"] 
            },
            "武": { 
                "克制": ["冰","机械","普","地","恶"], 
                "抵抗": ["毒","翼","萌","虫","幽灵","幻"] 
            },
            "毒": { 
                "克制": ["萌","草"], 
                "抵抗": ["地","幽灵","毒","机械"] 
            },
            "翼": { 
                "克制": ["武","虫","草"], 
                "抵抗": ["地","龙","电","机械"] 
            },
            "萌": { 
                "克制": ["武","龙","恶"], 
                "抵抗": ["毒","火","机械"] 
            },
            "虫": { 
                "克制": ["恶","草","幻"], 
                "抵抗": ["火","机械","武","毒","翼","萌","幽灵"] 
            },
            "地": { 
                "克制": ["电","火","冰","毒"], 
                "抵抗": ["草","武"] 
            },
            "幽灵": { 
                "克制": ["幽灵","光","幻"], 
                "抵抗": ["恶","普"] 
            },
            "龙": { 
                "克制": ["龙"], 
                "抵抗": ["机械"] 
            },
            "恶": { 
                "克制": ["毒","萌","幽灵"], 
                "抵抗": ["恶","光","武"] 
            },
            "光": { 
                "克制": ["幽灵","恶"], 
                "抵抗": ["草","冰"] 
            },
            "电": { 
                "克制": ["水","翼"], 
                "抵抗": ["地","龙","电","草"] 
            },
            "幻": { 
                "克制": ["武","毒"], 
                "抵抗": ["光","幻","机械"] 
            }
        };

        const allTypes = ["草","水","火","电","毒","幻","冰","武","萌","光","龙","机械","幽灵","恶","虫","普","翼","地"];
        
        const typeToIndex = {
            "草": 1, "水": 2, "火": 3, "电": 4, "毒": 5, "幻": 6,
            "冰": 7, "武": 8, "萌": 9, "光": 10, "龙": 11, "机械": 12,
            "幽灵": 13, "恶": 14, "虫": 15, "普": 16, "翼": 17, "地": 18
        };

        const container = document.getElementById('circleContainer');
        const infoPanel = document.getElementById('infoPanel');
        
        let selectedType = null;
        let iconWrappers = [];

        function init() {
            const totalIcons = 18;
            const radius = Math.min(window.innerWidth, window.innerHeight) * 0.35;
            
            for (let i = 0; i < totalIcons; i++) {
                const typeName = allTypes[i];
                const wrapper = document.createElement('div');
                wrapper.className = 'icon-wrapper';
                wrapper.dataset.type = typeName;
                
                const radian = (i * (360 / totalIcons) - 90) * Math.PI / 180;
                const x = radius * Math.cos(radian);
                const y = radius * Math.sin(radian);
                
                wrapper.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
                
                const img = document.createElement('img');
                img.className = 'icon';
                img.src = `image/icon-type-${i + 1}.png`;
                img.alt = typeName;
                img.dataset.typeName = typeName;
                
                img.addEventListener('click', () => selectType(typeName, wrapper));
                
                wrapper.appendChild(img);
                container.appendChild(wrapper);
                iconWrappers.push(wrapper);
            }
        }

        function selectType(typeName, wrapper) {
            iconWrappers.forEach(w => w.classList.remove('selected'));
            if (wrapper) {
                wrapper.classList.add('selected');
            }
            
            selectedType = typeName;
            const index = allTypes.indexOf(typeName);
            
            const centerCircle = document.querySelector('.center-circle');
            centerCircle.style.backgroundImage = `url(image/icon-type-${index + 1}.png)`;
            
            const existingTypeName = centerCircle.querySelector('.center-type-name');
            if (existingTypeName) {
                existingTypeName.remove();
            }
            const typeNameElement = document.createElement('div');
            typeNameElement.className = 'center-type-name';
            typeNameElement.textContent = typeName;
            centerCircle.appendChild(typeNameElement);
            
            infoPanel.classList.add('active');
            
            updateInfo(typeName);
            
            setTimeout(() => {
                infoPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        }

        function updateInfo(selectedType) {
            const data = TYPE_DATA[selectedType];
            const list1 = document.getElementById('list1');
            const list2 = document.getElementById('list2');
            const list3 = document.getElementById('list3');
            const list4 = document.getElementById('list4');
            
            list1.innerHTML = '';
            list2.innerHTML = '';
            list3.innerHTML = '';
            list4.innerHTML = '';
            
            data.克制.forEach(type => {
                const isEnemy = checkEnemy(selectedType, type);
                const item = createTypeItem(type, isEnemy);
                list1.appendChild(item);
            });
            
            data.抵抗.forEach(type => {
                const item = createTypeItem(type, false);
                list2.appendChild(item);
            });
            
            const typesThatBeatSelected = [];
            Object.keys(TYPE_DATA).forEach(type => {
                if (TYPE_DATA[type].克制.includes(selectedType)) {
                    typesThatBeatSelected.push(type);
                }
            });
            typesThatBeatSelected.forEach(type => {
                const isEnemy = checkEnemy(type, selectedType);
                const item = createTypeItem(type, isEnemy);
                list3.appendChild(item);
            });
            
            const typesThatResistSelected = [];
            Object.keys(TYPE_DATA).forEach(type => {
                if (TYPE_DATA[type].抵抗.includes(selectedType)) {
                    typesThatResistSelected.push(type);
                }
            });
            typesThatResistSelected.forEach(type => {
                const item = createTypeItem(type, false);
                list4.appendChild(item);
            });
        }

        function checkEnemy(attacker, defender) {
            const attackerData = TYPE_DATA[attacker];
            const defenderData = TYPE_DATA[defender];
            
            const attackerToDefender = attackerData.抵抗.includes(defender);
            const defenderToAttacker = defenderData.克制.includes(attacker);
            
            return attackerToDefender && defenderToAttacker;
        }

        function createTypeItem(typeName, isEnemy) {
            const wrapper = document.createElement('div');
            wrapper.className = 'type-item-wrapper';
            
            const index = typeToIndex[typeName];
            const item = document.createElement('div');
            item.className = `type-item${isEnemy ? ' enemy' : ''}`;
            
            const img = document.createElement('img');
            img.className = 'type-item-icon';
            img.src = `image/icon-type-${index}.png`;
            img.alt = typeName;
            img.title = typeName;
            
            const text = document.createElement('span');
            text.textContent = typeName;
            
            item.appendChild(img);
            item.appendChild(text);
            wrapper.appendChild(item);
            
            if (isEnemy) {
                const mark = document.createElement('div');
                mark.className = 'enemy-mark';
                mark.style.display = 'block';
                wrapper.appendChild(mark);
            }
            
            return wrapper;
        }

        window.addEventListener('resize', () => {
            const totalIcons = 18;
            const newRadius = Math.min(window.innerWidth, window.innerHeight) * 0.35;
            
            iconWrappers.forEach((wrapper, index) => {
                const radian = (index * (360 / totalIcons) - 90) * Math.PI / 180;
                const x = newRadius * Math.cos(radian);
                const y = newRadius * Math.sin(radian);
                wrapper.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
            });
        });

        init();

        // 默认选中草系
        const grassWrapper = iconWrappers[0];
        if (grassWrapper) {
            selectType('草', grassWrapper);
        }
    </script>
</body>
</html>
